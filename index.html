<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Социальный эксперимент · Комнаты</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #1e2b3c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            padding: 12px;
            margin: 0;
        }
        .game-container {
            max-width: 600px;
            width: 100%;
            background: #263b4f;
            border-radius: 32px;
            padding: 24px 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            color: #f0f3fa;
            border: 1px solid #3f556a;
        }
        h1 {
            font-weight: 700;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 4px;
            color: #fade85;
        }
        .sub {
            text-align: center;
            margin-bottom: 20px;
            color: #aabdd9;
            font-size: 0.9rem;
            border-bottom: 1px solid #3f556a;
            padding-bottom: 12px;
        }
        .screen {
            display: none;
        }
        .screen.active {
            display: block;
        }
        .card {
            background: #1e3447;
            border-radius: 28px;
            padding: 20px 16px;
            border: 1px solid #4d637b;
            box-shadow: inset 0 2px 5px #0f1a24;
        }
        button {
            background: #fade85;
            border: none;
            color: #1d2b3a;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 16px 24px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #a9844a;
            transition: 0.08s linear;
            width: 100%;
            border: 1px solid #ffefc0;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #a9844a;
        }
        button.secondary {
            background: #bbcde0;
            box-shadow: 0 5px 0 #7d8fa8;
            color: #152837;
        }
        button:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: 0 5px 0 #7b6d4e;
            pointer-events: none;
        }
        .flex-col {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .flex-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .room-info {
            background: #0f212f;
            border-radius: 40px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 1.2rem;
            border: 1px solid #617e9e;
        }
        .room-code {
            background: #2f4a62;
            padding: 8px 18px;
            border-radius: 60px;
            font-family: monospace;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: #fade85;
        }
        .players-list {
            margin: 16px 0;
            background: #152b39;
            border-radius: 30px;
            padding: 16px;
            max-height: 260px;
            overflow-y: auto;
        }
        .player-item {
            background: #1f3d52;
            border-radius: 40px;
            padding: 12px 20px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            border: 1px solid #5b7993;
        }
        .player-name {
            font-size: 1.3rem;
            font-weight: 500;
            flex: 1;
        }
        .vote-badge {
            background: #fade85;
            color: #1f2a3a;
            border-radius: 30px;
            padding: 4px 16px;
            font-weight: 600;
        }
        .player-opt-btn {
            background: #24495e;
            border: 2px solid #6189a6;
            border-radius: 50px;
            padding: 16px 8px;
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
            width: 100%;
            box-shadow: 0 4px 0 #0e2a38;
        }
        .player-opt-btn.selected {
            background: #fade85;
            color: #1d2a3a;
            border-color: #f5b542;
        }
        .question-box {
            background: #113041;
            border-radius: 36px;
            padding: 20px;
            text-align: center;
            border: 1px solid #6083a3;
            margin: 20px 0;
        }
        .question-text {
            font-size: 1.8rem;
            font-weight: 600;
        }
        .waiting-text {
            color: #ffdb9d;
            font-size: 1.3rem;
        }
        .result-block {
            background: #173e56;
            border-radius: 50px;
            padding: 24px;
            text-align: center;
            margin: 16px 0;
        }
        .winner-name {
            font-size: 3.5rem;
            font-weight: 800;
            color: #ffdd9e;
            text-shadow: 0 0 12px #f7b32b;
        }
        .host-controls {
            margin-top: 24px;
            border-top: 2px dashed #5c7993;
            padding-top: 24px;
        }
        .label {
            color: #bdd6ff;
            margin-bottom: 8px;
            font-size: 1rem;
        }
        input {
            background: #eaf0ff;
            border: none;
            padding: 16px 20px;
            border-radius: 60px;
            width: 100%;
            font-size: 1.2rem;
            color: #041a29;
        }
        .small-note {
            font-size: 0.9rem;
            color: #aac2df;
            margin-top: 16px;
        }
        .link-box {
            background: #0e2533;
            padding: 12px;
            border-radius: 40px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .link-box input {
            background: #213b4b;
            color: white;
            padding: 12px;
            font-size: 0.9rem;
        }
        .error-message {
            background: #8b2c2c;
            color: #ffd6d6;
            padding: 12px;
            border-radius: 30px;
            text-align: center;
            margin: 10px 0;
        }
    </style>
</head>
<body>
<div class="game-container" id="gameApp">
    <h1>🧪 Соцэксперимент</h1>
    <div class="sub">комнаты · анонимно · большинство</div>

    <!-- ЭКРАН СТАРТ (ВЫБОР РОЛИ) -->
    <div id="startScreen" class="screen active">
        <div class="card flex-col">
            <button id="createRoomBtn">➕ Создать комнату (ведущий)</button>
            <button id="joinRoomBtn" class="secondary">🔗 Присоединиться по ссылке</button>
            <div style="margin-top: 16px;">
                <label>👉 или введи код комнаты</label>
                <input type="text" id="joinCodeInput" placeholder="например: A1B2" maxlength="6" style="text-transform:uppercase;">
                <button id="submitJoinBtn" style="margin-top: 12px;">Войти</button>
            </div>
            <div class="small-note">ведущий запускает вопросы и показывает результат</div>
        </div>
    </div>

    <!-- ЭКРАН КОМНАТЫ (ожидание + имена) -->
    <div id="lobbyScreen" class="screen">
        <div class="card">
            <div class="room-info">
                <span>🚪 Комната</span>
                <span class="room-code" id="roomCodeDisplay">A1B2</span>
            </div>
            <div style="margin: 16px 0;">
                <label>🔗 Ссылка для игроков</label>
                <div class="link-box">
                    <input type="text" id="inviteLinkInput" readonly value="">
                    <button id="copyLinkBtn" style="width: auto; padding: 12px 20px;" class="secondary">Копировать</button>
                </div>
            </div>
            <div>
                <label>👥 Участники (<span id="lobbyCount">0</span>/<span id="lobbyMax">15</span>)</label>
                <div class="players-list" id="lobbyPlayersList"></div>
            </div>
            <div id="nameInputArea">
                <label>📝 Ваше имя</label>
                <input type="text" id="myNameInput" placeholder="Как вас зовут" maxlength="20">
            </div>
            <div style="margin-top: 20px;">
                <button id="lobbyReadyBtn" class="secondary">✅ Готово / Задать имя</button>
                <button id="startGameFromLobby" style="margin-top: 12px;" disabled>▶ Начать игру (только ведущий)</button>
            </div>
            <div class="small-note">* Ведущий видит кнопку старта после имён всех игроков</div>
        </div>
    </div>

    <!-- ЭКРАН ГОЛОСОВАНИЯ -->
    <div id="voteScreen" class="screen">
        <div class="card">
            <div class="question-box">
                <div class="question-text" id="voteQuestion">Кто сегодня самый весёлый?</div>
            </div>
            <div style="margin: 12px 0 8px;" id="voteStatus">👤 Ожидаем голоса...</div>
            <div id="voteOptionsGrid" class="flex-col" style="gap: 8px; max-height: 320px; overflow-y: auto;"></div>
            <button id="submitVoteBtn" disabled style="margin-top: 24px;">✅ Подтвердить выбор</button>
            <div class="small-note" style="text-align:center" id="voteHint"></div>
        </div>
    </div>

    <!-- ЭКРАН РЕЗУЛЬТАТА -->
    <div id="resultScreen" class="screen">
        <div class="card">
            <div class="question-box" style="padding: 16px;">
                <span style="opacity:0.8;">Вопрос:</span>
                <div id="resultQuestionDisplay" style="font-size: 1.8rem; font-weight:600;">...</div>
            </div>
            <div id="resultPending" style="text-align: center; padding: 20px;">
                <span class="waiting-text">⏳ Ведущий скоро покажет результат...</span>
            </div>
            <div id="resultFinished" style="display: none;">
                <div class="result-block">
                    <div style="font-size:1.3rem;">выбрало большинство</div>
                    <div class="winner-name" id="winnerName">-</div>
                    <div id="winnerVotesInfo" style="font-size:1.4rem;"></div>
                </div>
                <div id="detailsList" style="background:#1a3547; border-radius: 30px; padding: 16px; margin: 12px 0;"></div>
            </div>
            <!-- ТОЛЬКО ДЛЯ ВЕДУЩЕГО -->
            <div id="hostResultControls" style="display: none;" class="host-controls">
                <button id="revealResultBtn">🔍 Показать результат</button>
                <button id="nextRoundBtn" style="margin-top: 12px;" class="secondary">⏩ Другой вопрос</button>
            </div>
            <div style="margin-top: 20px;">
                <button id="leaveToStartBtn" class="warning" style="background:#b0c4de; box-shadow:0 5px 0 #7688a3;">🏠 На главную</button>
            </div>
        </div>
    </div>
</div>

<script>
    (function(){
        // Обработка ошибок для Vercel и Telegram
        window.addEventListener('error', function(e) {
            console.error('Global error:', e.error);
        });

        // Для Vercel: перенаправление на корень если открыт несуществующий путь
        if (window.location.pathname !== '/' && !window.location.pathname.includes('index.html')) {
            window.history.replaceState(null, '', '/');
        }

        // Состояние приложения
        const currentPlayer = {
            id: 'player_' + Math.random().toString(36).substring(2, 10) + '_' + Date.now(),
            name: '',
            isHost: false,
            roomId: null
        };

        // Глобальное состояние комнат
        window.rooms = window.rooms || {};

        // Вспомогательные функции
        function generateRoomId() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        function getRandomQuestion() {
            const qbank = [
                'Кто чаще всех опаздывает?',
                'Кто самый добрый?',
                'Кто громче всех смеется?',
                'Кто лучше всех готовит?',
                'Кто любит поспать?',
                'Кто душа компании?',
                'Кто самый спокойный?',
                'Кто самый креативный?',
                'Кто чаще всех шутит?',
                'Кто лучше всех поет?'
            ];
            return qbank[Math.floor(Math.random() * qbank.length)];
        }

        // Управление экранами
        let currentScreen = 'start';
        const startScreen = document.getElementById('startScreen');
        const lobbyScreen = document.getElementById('lobbyScreen');
        const voteScreen = document.getElementById('voteScreen');
        const resultScreen = document.getElementById('resultScreen');

        function setActiveScreen(screenId) {
            startScreen.classList.remove('active');
            lobbyScreen.classList.remove('active');
            voteScreen.classList.remove('active');
            resultScreen.classList.remove('active');
            
            if (screenId === 'start') startScreen.classList.add('active');
            if (screenId === 'lobby') lobbyScreen.classList.add('active');
            if (screenId === 'vote') voteScreen.classList.add('active');
            if (screenId === 'result') resultScreen.classList.add('active');
            
            currentScreen = screenId;
        }

        // Рендер лобби
        function renderLobby() {
            const room = window.rooms[currentPlayer.roomId];
            if (!room) return;
            
            document.getElementById('roomCodeDisplay').innerText = room.id;
            document.getElementById('lobbyCount').innerText = room.players.length;
            document.getElementById('lobbyMax').innerText = '15';
            
            const listDiv = document.getElementById('lobbyPlayersList');
            let html = '';
            room.players.forEach(p => {
                html += `<div class="player-item"><span class="player-name">${p.name || 'Без имени'}</span></div>`;
            });
            listDiv.innerHTML = html;

            const inviteLink = window.location.origin + window.location.pathname + '?join=' + room.id;
            document.getElementById('inviteLinkInput').value = inviteLink;

            // Если я хост, активируем кнопку старта
            if (currentPlayer.isHost) {
                const allNamed = room.players.length >= 3 && room.players.every(p => p.name && p.name.trim() !== '');
                document.getElementById('startGameFromLobby').disabled = !allNamed;
            } else {
                document.getElementById('startGameFromLobby').disabled = true;
            }

            // Поле моего имени
            const me = room.players.find(p => p.id === currentPlayer.id);
            if (me) {
                document.getElementById('myNameInput').value = me.name || '';
            }
        }

        // Рендер голосования
        function renderVote() {
            const room = window.rooms[currentPlayer.roomId];
            if (!room || room.stage !== 'voting') return;
            
            document.getElementById('voteQuestion').innerText = room.question;
            
            const grid = document.getElementById('voteOptionsGrid');
            let btns = '';
            room.players.forEach((p, idx) => {
                if (p.id !== currentPlayer.id) {
                    btns += `<button class="player-opt-btn" data-vote-index="${idx}">${p.name || 'Без имени'}</button>`;
                } else {
                    btns += `<button class="player-opt-btn" disabled style="opacity:0.4;">${p.name || 'Без имени'} (это вы)</button>`;
                }
            });
            grid.innerHTML = btns;

            const me = room.players.find(p => p.id === currentPlayer.id);
            if (me && me.hasVoted) {
                document.getElementById('submitVoteBtn').disabled = true;
                document.getElementById('voteHint').innerText = '✔ Вы уже проголосовали';
            } else {
                document.getElementById('submitVoteBtn').disabled = true;
                document.getElementById('voteHint').innerText = '';
            }

            // Подсветка выбранного
            document.querySelectorAll('.player-opt-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (me?.hasVoted) return;
                    document.querySelectorAll('.player-opt-btn').forEach(b => b.classList.remove('selected'));
                    e.currentTarget.classList.add('selected');
                    document.getElementById('submitVoteBtn').disabled = false;
                    window.selectedVoteIndex = e.currentTarget.dataset.voteIndex;
                });
            });

            // Статус голосования
            const votedCount = room.players.filter(p => p.hasVoted).length;
            document.getElementById('voteStatus').innerHTML = `👤 Проголосовало: ${votedCount}/${room.players.length}`;
        }

        // Рендер результата
        function renderResult() {
            const room = window.rooms[currentPlayer.roomId];
            if (!room || room.stage !== 'result') return;
            
            document.getElementById('resultQuestionDisplay').innerText = room.question;
            
            if (room.votesVisible) {
                document.getElementById('resultPending').style.display = 'none';
                document.getElementById('resultFinished').style.display = 'block';
                
                // Подсчёт голосов
                const counts = new Array(room.players.length).fill(0);
                room.players.forEach(p => { 
                    if (p.vote !== undefined && p.vote !== null) counts[p.vote]++; 
                });
                
                let max = Math.max(...counts);
                let winners = [];
                counts.forEach((c, i) => { 
                    if (c === max) winners.push(i); 
                });
                
                const winnerIdx = winners[0] || 0;
                document.getElementById('winnerName').innerText = room.players[winnerIdx]?.name || '?';
                document.getElementById('winnerVotesInfo').innerHTML = `${max} голос(ов) ${winners.length > 1 ? '(ничья)' : ''}`;
                
                let details = '';
                room.players.forEach((p, i) => {
                    details += `<div style="display:flex; justify-content:space-between; padding:6px;">
                        <span>${p.name || 'Без имени'}</span> 
                        <span><strong>${counts[i]}</strong> ${winners.includes(i) ? '👑' : ''}</span>
                    </div>`;
                });
                document.getElementById('detailsList').innerHTML = details;
            } else {
                document.getElementById('resultPending').style.display = 'block';
                document.getElementById('resultFinished').style.display = 'none';
            }

            // Кнопки хоста
            if (currentPlayer.isHost) {
                document.getElementById('hostResultControls').style.display = 'block';
                document.getElementById('revealResultBtn').style.display = room.votesVisible ? 'none' : 'block';
                document.getElementById('nextRoundBtn').style.display = room.votesVisible ? 'block' : 'none';
            } else {
                document.getElementById('hostResultControls').style.display = 'none';
            }
        }

        // Обновление UI
        function refreshUI() {
            if (!currentPlayer.roomId || !window.rooms[currentPlayer.roomId]) {
                setActiveScreen('start');
                return;
            }
            
            const room = window.rooms[currentPlayer.roomId];
            
            if (room.stage === 'lobby') setActiveScreen('lobby');
            else if (room.stage === 'voting') setActiveScreen('vote');
            else if (room.stage === 'result') setActiveScreen('result');

            if (currentScreen === 'lobby') renderLobby();
            if (currentScreen === 'vote') renderVote();
            if (currentScreen === 'result') renderResult();
        }

        // Обработчики событий
        document.getElementById('createRoomBtn').addEventListener('click', () => {
            const roomId = generateRoomId();
            window.rooms[roomId] = {
                id: roomId,
                hostId: currentPlayer.id,
                players: [{ 
                    id: currentPlayer.id, 
                    name: '', 
                    hasVoted: false, 
                    vote: null 
                }],
                stage: 'lobby',
                question: getRandomQuestion(),
                votesVisible: false
            };
            currentPlayer.roomId = roomId;
            currentPlayer.isHost = true;
            refreshUI();
        });

        document.getElementById('submitJoinBtn').addEventListener('click', () => {
            const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
            if (code && window.rooms[code]) {
                currentPlayer.roomId = code;
                currentPlayer.isHost = false;
                const room = window.rooms[code];
                if (!room.players.find(p => p.id === currentPlayer.id)) {
                    room.players.push({ 
                        id: currentPlayer.id, 
                        name: '', 
                        hasVoted: false, 
                        vote: null 
                    });
                }
                refreshUI();
            } else {
                alert('Комната не найдена');
            }
        });

        document.getElementById('copyLinkBtn').addEventListener('click', () => {
            const inp = document.getElementById('inviteLinkInput');
            inp.select();
            navigator.clipboard?.writeText(inp.value).then(() => {
                alert('Ссылка скопирована!');
            });
        });

        document.getElementById('lobbyReadyBtn').addEventListener('click', () => {
            const name = document.getElementById('myNameInput').value.trim();
            if (!name) { 
                alert('Введите имя'); 
                return; 
            }
            const room = window.rooms[currentPlayer.roomId];
            if (room) {
                const me = room.players.find(p => p.id === currentPlayer.id);
                if (me) me.name = name;
                refreshUI();
            }
        });

        document.getElementById('startGameFromLobby').addEventListener('click', () => {
            if (!currentPlayer.isHost) return;
            const room = window.rooms[currentPlayer.roomId];
            if (room.players.length < 3) { 
                alert('Минимум 3 игрока'); 
                return; 
            }
            room.stage = 'voting';
            room.question = getRandomQuestion();
            room.players.forEach(p => { 
                p.hasVoted = false; 
                p.vote = null; 
            });
            refreshUI();
        });

        document.getElementById('submitVoteBtn').addEventListener('click', () => {
            if (window.selectedVoteIndex === undefined) return;
            
            const room = window.rooms[currentPlayer.roomId];
            const me = room.players.find(p => p.id === currentPlayer.id);
            
            if (me.hasVoted) return;
            
            me.vote = parseInt(window.selectedVoteIndex);
            me.hasVoted = true;
            
            document.getElementById('submitVoteBtn').disabled = true;
            document.querySelectorAll('.player-opt-btn').forEach(b => b.classList.remove('selected'));
            
            refreshUI();
        });

        document.getElementById('revealResultBtn').addEventListener('click', () => {
            if (!currentPlayer.isHost) return;
            const room = window.rooms[currentPlayer.roomId];
            room.votesVisible = true;
            refreshUI();
        });

        document.getElementById('nextRoundBtn').addEventListener('click', () => {
            if (!currentPlayer.isHost) return;
            const room = window.rooms[currentPlayer.roomId];
            room.stage = 'voting';
            room.votesVisible = false;
            room.question = getRandomQuestion();
            room.players.forEach(p => { 
                p.hasVoted = false; 
                p.vote = null; 
            });
            refreshUI();
        });

        document.getElementById('leaveToStartBtn').addEventListener('click', () => {
            currentPlayer.roomId = null;
            currentPlayer.isHost = false;
            setActiveScreen('start');
        });

        // Проверка параметров URL для присоединения
        function checkJoinParam() {
            const urlParams = new URLSearchParams(window.location.search);
            const joinCode = urlParams.get('join');
            
            if (joinCode && window.rooms[joinCode]) {
                setTimeout(() => {
                    currentPlayer.roomId = joinCode;
                    currentPlayer.isHost = false;
                    const room = window.rooms[joinCode];
                    if (!room.players.find(p => p.id === currentPlayer.id)) {
                        room.players.push({ 
                            id: currentPlayer.id, 
                            name: '', 
                            hasVoted: false, 
                            vote: null 
                        });
                    }
                    refreshUI();
                }, 300);
            }
        }

        // Инициализация
        setActiveScreen('start');
        checkJoinParam();

        // Периодическое обновление
        setInterval(() => {
            if (currentPlayer.roomId && window.rooms[currentPlayer.roomId]) {
                refreshUI();
            }
        }, 1000);
    })();
</script>
</body>
</html>
